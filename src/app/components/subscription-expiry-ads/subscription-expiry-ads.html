<div class="expiry-banner" *ngIf="visible" role="status">
  <div class="expiry-banner__body">
    <span class="expiry-banner__pill">Account support</span>
    <div class="expiry-banner__copy">
      <strong>{{ adTitle() }}</strong>
      <p>{{ adMessage() }}</p>
    </div>
  </div>

  <div class="expiry-banner__actions">
    <button type="button" class="expiry-banner__pay" (click)="openPayment()">Contact Support</button>
    <button type="button" class="expiry-banner__later" (click)="dismiss()">Later</button>
    <button type="button" class="expiry-banner__close" (click)="dismiss()" aria-label="Dismiss reminder">&times;</button>
  </div>
</div>
