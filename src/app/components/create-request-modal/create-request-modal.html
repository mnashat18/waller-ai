<div class="fixed inset-0 z-[1300] overflow-y-auto bg-slate-950/70 backdrop-blur-sm">
  <div class="flex min-h-full items-center justify-center p-4 sm:p-6">
    <form
      class="w-full max-w-xl space-y-6 rounded-2xl border border-slate-700/60 bg-[#0f172a] p-6 text-slate-100 shadow-[0_24px_70px_rgba(2,6,23,0.7)] sm:p-8"
      (submit)="onSubmit(requestedForEmailInput.value, requiredStateInput.value); $event.preventDefault()">
      <div class="flex items-start justify-between gap-3">
        <div>
          <h3 class="text-2xl font-semibold tracking-tight">Create Scan Request</h3>
          <p class="mt-1 text-sm text-slate-400">Send a request by email and choose the required state.</p>
        </div>
        <button
          class="inline-flex h-9 w-9 items-center justify-center rounded-full border border-slate-700 text-lg text-slate-300 transition hover:border-slate-500 hover:text-white"
          aria-label="Close modal"
          (click)="close.emit()">
          &times;
        </button>
      </div>

      <div
        *ngIf="businessTrialNotice"
        class="rounded-lg border border-amber-300/50 bg-amber-500/10 px-3 py-2 text-sm text-amber-200">
        {{ businessTrialNotice }}
      </div>

      <!-- Recipient Email -->
      <div>
        <label class="label" for="request-user-id">Recipient Email</label>
        <input
          #requestedForEmailInput
          class="input"
          id="request-user-id"
          name="requested_for_email"
          type="email"
          autocomplete="email"
          required
          placeholder="name@email.com" />
      </div>

      <!-- Required State -->
      <div>
        <label class="label" for="required-state">Required State</label>
        <select
          #requiredStateInput
          id="required-state"
          name="required_state"
          class="input"
          required>
          <option value="" selected disabled>Select required state</option>
          <option *ngFor="let state of requiredStateOptions" [value]="state">{{ state }}</option>
        </select>
        <p *ngIf="businessInviteTrialNotice" class="mt-2 text-xs text-amber-300">
          {{ businessInviteTrialNotice }}
        </p>
      </div>

      <button
        type="submit"
        class="btn-primary w-full disabled:cursor-not-allowed disabled:opacity-60"
        [disabled]="submitting"
        >
        Send Request
      </button>
      <p
        *ngIf="feedback as info"
        class="rounded-lg border px-3 py-2 text-sm"
        [ngClass]="{
          'border-green-400/50 bg-green-500/10 text-green-300': info.type === 'success',
          'border-red-400/50 bg-red-500/10 text-red-300': info.type === 'error',
          'border-slate-500/50 bg-slate-500/10 text-slate-300': info.type === 'info'
        }">
        {{ info.message }}
      </p>
    </form>
  </div>
</div>
