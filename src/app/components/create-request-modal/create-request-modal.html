<div
  class="fixed inset-0 z-[1300] bg-black/55 flex items-start justify-center overflow-y-auto p-4 sm:p-6">

  <div class="my-4 sm:my-8 bg-white rounded-xl p-6 sm:p-8 w-full max-w-lg space-y-6 shadow-2xl">

    <div class="flex justify-between items-center">
      <h3 class="text-xl font-semibold">Create Scan Request</h3>
      <button
        class="text-slate-400 hover:text-slate-600"
        (click)="close.emit()">
        x
      </button>
    </div>

    <div
      *ngIf="businessTrialNotice"
      class="rounded-lg border border-amber-300 bg-amber-50 px-3 py-2 text-sm text-amber-700">
      {{ businessTrialNotice }}
    </div>

    <!-- Recipient Email -->
    <div>
      <label class="label" for="request-user-id">Recipient Email</label>
      <input
        #requestedForEmailInput
        class="input"
        id="request-user-id"
        type="email"
        required
        placeholder="name@email.com" />
    </div>

    <!-- Required State -->
    <div>
      <label class="label" for="required-state">Required State</label>
      <select
        #requiredStateInput
        id="required-state"
        class="input"
        required>
        <option value="" selected disabled>Select required state</option>
        <option *ngFor="let state of requiredStateOptions" [value]="state">{{ state }}</option>
      </select>
      <p *ngIf="businessInviteTrialNotice" class="text-xs text-amber-600 mt-2">
        {{ businessInviteTrialNotice }}
      </p>
    </div>

    <button
      type="button"
      class="btn-primary w-full disabled:opacity-60 disabled:cursor-not-allowed"
      [disabled]="submitting"
      (click)="onSubmit(requestedForEmailInput.value, requiredStateInput.value)">
      Send Request
    </button>
    <p
      *ngIf="feedback as info"
      class="text-sm"
      [ngClass]="{
        'text-green-600': info.type === 'success',
        'text-red-500': info.type === 'error',
        'text-slate-500': info.type === 'info'
      }">
      {{ info.message }}
    </p>

  </div>
</div>
