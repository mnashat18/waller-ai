<div class="notif-wrap">
  <button
    type="button"
    (click)="toggleOpen(); $event.stopPropagation()"
    class="notif-button"
    aria-label="Notifications">
    <svg class="notif-icon" viewBox="0 0 24 24" aria-hidden="true">
      <path
        d="M12 22a2.5 2.5 0 0 0 2.45-2h-4.9A2.5 2.5 0 0 0 12 22Zm7-6V11a7 7 0 1 0-14 0v5l-2 2v1h18v-1l-2-2Z"
        fill="currentColor"/>
    </svg>
    <span class="notif-count" *ngIf="unreadCount > 0">{{ unreadCount }}</span>
  </button>

  <div *ngIf="open" class="notif-overlay" (click)="closePanel()">
    <div class="notif-panel" (click)="$event.stopPropagation()">
      <div class="notif-header">
        <div>
          <h4>Notifications</h4>
          <span class="notif-sub">{{ unreadCount }} unread</span>
        </div>
        <div class="notif-tools">
          <button type="button" class="notif-tool-btn" (click)="refresh()">Refresh</button>
          <button type="button" class="notif-tool-btn" (click)="viewAll()">View all</button>
        </div>
      </div>

      <div *ngIf="loading" class="notif-empty">Loading notifications...</div>
      <div *ngIf="!loading && errorMessage" class="notif-empty">{{ errorMessage }}</div>
      <div *ngIf="!loading && !errorMessage && notifications.length === 0" class="notif-empty">
        No notifications yet.
      </div>

      <div class="notif-list" *ngIf="!loading && notifications.length > 0">
        <button
          *ngFor="let n of notifications"
          class="notif-item"
          [class.notif-item-read]="!isUnread(n)"
          (click)="openDetails(n)">

          <div class="notif-dot" [class.notif-dot-read]="!isUnread(n)"></div>

          <div class="notif-body">
            <div class="notif-row">
              <span class="notif-type">{{ n.iconKey }}</span>
              <span class="notif-status" [class.notif-status--read]="!isUnread(n)">
                {{ isUnread(n) ? 'Unread' : 'Read' }}
              </span>
              <span class="notif-time">{{ relativeTime(n) }}</span>
            </div>
            <p class="notif-title">{{ n.title }}</p>
            <p class="notif-desc">{{ n.message }}</p>
          </div>
        </button>
      </div>
    </div>
  </div>
</div>

<div *ngIf="selectedNotification" class="fixed inset-0 bg-black/40 flex items-center justify-center z-50">
  <div class="bg-white dark:bg-slate-900 rounded-xl p-8 w-full max-w-xl space-y-6">
    <div class="flex justify-between items-start">
      <h3 class="text-xl font-semibold">{{ selectedNotification.title }}</h3>
      <button class="notif-close" (click)="closeDetails()" aria-label="Close">&times;</button>
    </div>

    <div class="text-sm space-y-1">
      <p><strong>Status:</strong> {{ isUnread(selectedNotification) ? 'Unread' : 'Read' }}</p>
      <p><strong>Time:</strong> {{ relativeTime(selectedNotification) }}</p>
    </div>

    <div>
      <p class="font-medium mb-1">Message</p>
      <p class="text-slate-600 dark:text-slate-300">{{ selectedNotification.message }}</p>
    </div>
  </div>
</div>
