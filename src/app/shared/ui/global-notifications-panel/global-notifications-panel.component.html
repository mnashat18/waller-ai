<div class="relative" (click)="stopPropagation($event)">
  <button
    type="button"
    (click)="toggle($event)"
    [attr.aria-expanded]="open"
    aria-controls="global-notifications-panel"
    aria-haspopup="dialog"
    aria-label="Notifications"
    class="relative inline-flex h-10 w-10 items-center justify-center rounded-full border border-slate-200 bg-white text-slate-600 shadow-sm transition hover:bg-slate-50 hover:text-slate-900 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-sky-400">
    <svg viewBox="0 0 24 24" fill="none" class="h-4 w-4" aria-hidden="true">
      <path d="M12 4a5 5 0 0 0-5 5v2.5c0 1.1-.3 2.2-.9 3.1L5 16h14l-1.1-1.4c-.6-.9-.9-2-.9-3.1V9a5 5 0 0 0-5-5Z" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"></path>
      <path d="M9.5 18a2.5 2.5 0 0 0 5 0" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"></path>
    </svg>

    <ng-container *ngIf="notificationsState$ | async as notificationsState">
      <span
        *ngIf="notificationsState.unreadCount > 0"
        class="absolute -right-0.5 -top-0.5 inline-flex min-h-4 min-w-4 items-center justify-center rounded-full bg-rose-500 px-1 text-[10px] font-semibold leading-4 text-white">
        {{ notificationsState.unreadCount }}
      </span>
    </ng-container>
  </button>

  <div
    *ngIf="open && (notificationsState$ | async) as notificationsState"
    id="global-notifications-panel"
    role="dialog"
    aria-label="Notifications"
    class="absolute right-0 z-30 mt-3 w-[28rem] rounded-3xl border border-slate-200 bg-white p-4 shadow-xl">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-sm font-semibold text-slate-950">Notifications</p>
        <p class="mt-1 text-xs text-slate-500">Active organization notification center</p>
      </div>
    </div>

    <div *ngIf="notificationsState.loading" class="mt-4">
      <app-empty-state title="Loading notifications" message="Fetching the latest notifications for this active organization."></app-empty-state>
    </div>

    <div *ngIf="!notificationsState.loading && notificationsState.error" class="mt-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
      Notifications could not be loaded
    </div>

    <div *ngIf="!notificationsState.loading && !notificationsState.error && !notificationsState.recentNotifications.length" class="mt-4">
      <app-empty-state title="No notifications" message="No in-app notifications were returned for the active organization."></app-empty-state>
    </div>

    <div *ngIf="!notificationsState.loading && !notificationsState.error && notificationsState.recentNotifications.length" class="mt-4 max-h-[28rem] space-y-3 overflow-y-auto">
      <article
        *ngFor="let item of notificationsState.recentNotifications"
        class="rounded-2xl border border-slate-200 px-4 py-3"
        [class.cursor-pointer]="item.linkId && item.linkType"
        (click)="openNotification(item, $event)">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-start gap-3">
            <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-slate-100 text-xs font-semibold text-slate-600">
              {{ iconLabel(item) }}
            </span>
            <div>
              <p class="text-sm font-semibold text-slate-950">{{ item.title }}</p>
              <p class="mt-1 text-sm text-slate-500">{{ item.message }}</p>
            </div>
          </div>
          <div class="flex shrink-0 items-center">
            <app-status-badge [status]="statusLabel(item)"></app-status-badge>
          </div>
        </div>
        <div class="mt-3 flex items-center justify-end gap-3 text-xs text-slate-400">
          <span>{{ item.dateCreated | date: 'yyyy-MM-dd HH:mm' }}</span>
        </div>
      </article>
    </div>
  </div>
</div>
