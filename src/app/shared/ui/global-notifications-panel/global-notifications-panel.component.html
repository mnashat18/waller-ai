<div class="relative" (click)="stopPropagation($event)">
  <button
    type="button"
    (click)="toggle($event)"
    class="inline-flex items-center gap-2 rounded-full border border-slate-200 bg-white px-4 py-2 text-sm font-medium text-slate-700 shadow-sm">
    <ng-container *ngIf="notificationsState$ | async as notificationsState">
      <span class="inline-flex h-8 min-w-8 items-center justify-center rounded-full bg-slate-100 px-2 text-slate-700">
        {{ notificationsState.loading ? '...' : notificationsState.unreadCount }}
      </span>
    </ng-container>
    <span>Notifications</span>
  </button>

  <div *ngIf="open && (notificationsState$ | async) as notificationsState" class="absolute right-0 z-30 mt-3 w-[28rem] rounded-3xl border border-slate-200 bg-white p-4 shadow-xl">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-sm font-semibold text-slate-950">Notifications</p>
        <p class="mt-1 text-xs text-slate-500">Active workspace notification center</p>
      </div>
      <span class="inline-flex min-w-8 items-center justify-center rounded-full bg-slate-100 px-2 py-1 text-xs font-semibold text-slate-700">
        {{ notificationsState.unreadCount }}
      </span>
    </div>

    <div class="mt-3 flex items-center justify-between gap-2">
      <button
        type="button"
        (click)="refresh($event)"
        class="rounded-full border border-slate-200 px-3 py-1 text-xs font-medium text-slate-600">
        Refresh
      </button>
      <button
        type="button"
        (click)="viewAll($event)"
        class="rounded-full border border-slate-200 px-3 py-1 text-xs font-medium text-slate-500">
        View all
      </button>
    </div>

    <div *ngIf="notificationsState.loading" class="mt-4">
      <app-empty-state title="Loading notifications" message="Fetching the latest notifications for this company context."></app-empty-state>
    </div>

    <div *ngIf="!notificationsState.loading && notificationsState.error" class="mt-4 rounded-2xl border border-rose-200 bg-rose-50 px-4 py-3 text-sm text-rose-700">
      Notifications could not be loaded
    </div>

    <div *ngIf="!notificationsState.loading && !notificationsState.error && !notificationsState.recentNotifications.length" class="mt-4">
      <app-empty-state title="No notifications" message="No in-app notifications were returned for the active company context."></app-empty-state>
    </div>

    <div *ngIf="!notificationsState.loading && !notificationsState.error && notificationsState.recentNotifications.length" class="mt-4 max-h-[28rem] space-y-3 overflow-y-auto">
      <article
        *ngFor="let item of notificationsState.recentNotifications"
        class="rounded-2xl border border-slate-200 px-4 py-3">
        <div class="flex items-start justify-between gap-3">
          <div class="flex items-start gap-3">
            <span class="inline-flex h-8 w-8 shrink-0 items-center justify-center rounded-full bg-slate-100 text-xs font-semibold text-slate-600">
              {{ iconLabel(item) }}
            </span>
            <div>
              <p class="text-sm font-semibold text-slate-950">{{ item.title }}</p>
              <p class="mt-1 text-sm text-slate-500">{{ item.message }}</p>
            </div>
          </div>
          <div class="flex shrink-0 items-center">
            <app-status-badge [status]="statusLabel(item)"></app-status-badge>
          </div>
        </div>
        <div class="mt-3 flex items-center justify-end gap-3 text-xs text-slate-400">
          <span>{{ item.dateCreated | date: 'yyyy-MM-dd HH:mm' }}</span>
        </div>
      </article>
    </div>
  </div>
</div>
