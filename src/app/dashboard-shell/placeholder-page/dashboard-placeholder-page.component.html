<div class="space-y-6">
  <ng-container *ngIf="state$ | async as state">
    <app-page-header
      eyebrow="Operational Page"
      [title]="page.title"
      [description]="page.description"
      [breadcrumbs]="breadcrumbs">
      <div pageActions>
        <app-role-badge [role]="state.context.activeMemberRole"></app-role-badge>
      </div>
    </app-page-header>

    <app-loading-state
      *ngIf="state.loading"
      title="Loading organization context"
      description="Resolving active organization, department scope, and access level for this page.">
    </app-loading-state>

    <app-error-state
      *ngIf="!state.loading && state.error"
      title="Organization context could not be resolved"
      [message]="state.error"
      (retry)="retry()">
    </app-error-state>

    <div class="grid gap-4 xl:grid-cols-3">
      <app-company-context-chip
        label="Access Level Summary"
        [value]="roleScopeSummary(state.context.activeMemberRole, state.context.activeDepartmentName, state.context.activeDepartmentId)"
        detail="Page access is based on your active organization and department scope.">
      </app-company-context-chip>

      <app-company-context-chip
        label="Active Organization"
        [value]="state.context.activeBusinessProfileName || state.context.activeBusinessProfileId"
        [detail]="companyScopeSummary(state.context.activeBusinessProfileName, state.context.activeBusinessProfileId)">
      </app-company-context-chip>

      <app-company-context-chip
        label="Current Department Context"
        [value]="state.context.activeDepartmentName || state.context.activeDepartmentId"
        [detail]="state.context.activeDepartmentId ? 'Manager routes remain department-scoped.' : 'No department override is active.'"
        fallback="Organization-wide">
      </app-company-context-chip>
    </div>

    <app-empty-state
      title="Page setup in progress"
      [message]="'The ' + page.title + ' page is connected to the shared dashboard shell. Detailed widgets and organization tables will be completed in the next implementation phase.'">
    </app-empty-state>
  </ng-container>
</div>
