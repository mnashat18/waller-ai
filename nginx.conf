server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ----------------------------------------------------------------------------
    # Baseline security headers (server level).
    # NOTE (nginx inheritance): add_header in a location block DROPS all inherited
    # add_header directives. Any location that sets its own header (e.g. Cache-Control)
    # MUST re-declare the security set below, so it is repeated in each such block.
    #
    # CSP notes:
    #   script-src 'unsafe-inline' is required by Angular's production index.html
    #     (the inline auth-callback bootstrap script and the deferred-stylesheet
    #     onload="this.media='all'" handler). Strict 'self' would leave the app
    #     unstyled and break OAuth-callback capture. See README/security follow-up
    #     for the nonce/hash hardening path.
    #   style-src 'unsafe-inline' is required by Angular runtime style injection +
    #     the inlined critical CSS; https://fonts.googleapis.com serves the web font.
    #   connect-src is the real tenant exfiltration boundary (API + app origins only).
    #   Google login is a top-level redirect (not XHR), so no Google host is needed.
    # ----------------------------------------------------------------------------
    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://dash.conntinuity.com https://conntinuity.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    location = /index.html {
        try_files /index.html =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Re-declare security headers (this block overrides add_header inheritance).
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://dash.conntinuity.com https://conntinuity.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    location ~* \.(?:js|mjs|css|map|json)$ {
        try_files $uri =404;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";

        # Re-declare security headers (this block overrides add_header inheritance).
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://dash.conntinuity.com https://conntinuity.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    location ~* \.(?:png|jpg|jpeg|gif|svg|ico|webp|avif|woff2?|ttf|eot)$ {
        try_files $uri =404;
        add_header Cache-Control "public, max-age=31536000, immutable";

        # Re-declare security headers (this block overrides add_header inheritance).
        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: blob: https:; font-src 'self' data: https:; connect-src 'self' https://dash.conntinuity.com https://conntinuity.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    location / {
        try_files $uri $uri/ /index.html;
        # No add_header here, so the server-level security headers are inherited.
    }
}
